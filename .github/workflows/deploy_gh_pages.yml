name: 部署文档

on:
  push:
    branches:
    - main

permissions:
  contents: write

jobs:
  deploy-gh-pages:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        # 如果你文档需要 Git 子模块，取消注释下一行
        # submodules: true

    - name: 设置 pnpm
      uses: pnpm/action-setup@v6
      with:
        version: 11

    - name: 设置 Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: pnpm

    - name: Install deps
      run: pnpm ci

    - name: 构建文档
      env:
        NODE_OPTIONS: --max_old_space_size=8192
      run: pnpm run docs:build

    - name: 部署文档
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        # 部署文档
        token: ${{ secrets.ACCESS_TOKEN }}
        branch: gh-pages
        folder: ./dist
        single-commit: true
